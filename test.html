<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Net + Cable • Admin</title>
<style>
  :root{
    --bg:#060b1f;
    --bg2:#0b1232;
    --panel:#0d1537;
    --panel-2:#111a42;
    --panel-3:#0b1436;
    --border:#22357e;
    --border-soft:rgba(88,120,255,.28);
    --text:#eef2ff;
    --muted:#97a6d8;
    --muted-2:#7283ba;
    --accent:#6c89ff;
    --accent-2:#8d62ff;
    --green:#37d1b5;
    --green-deep:#103d3d;
    --red:#ff627e;
    --red-deep:#431427;
    --yellow:#f5c96a;
    --yellow-deep:#403318;
    --shadow:0 20px 50px rgba(0,0,0,.34);
    --radius:22px;
    --radius-sm:16px;
    --radius-xs:13px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:
    radial-gradient(circle at 18% 12%, rgba(36,177,176,.16), transparent 18%),
    radial-gradient(circle at 82% 10%, rgba(120,88,255,.14), transparent 18%),
    radial-gradient(circle at 50% 40%, rgba(57,90,255,.12), transparent 22%),
    linear-gradient(180deg, #040816 0%, #071130 48%, #07102a 100%);
    color:var(--text); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    width:100%; min-height:100%;
    overflow-x:hidden;
  }
  body{padding:0}
  button,input,select,textarea{font:inherit}
  a{color:inherit;text-decoration:none}
  .app{
    width:100%;
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    padding:calc(var(--safe-top) + 12px) 12px calc(var(--safe-bottom) + 24px);
    position:relative;
    overflow-x:hidden;
  }
  .shell{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .card{
    background:linear-gradient(180deg, rgba(13,21,55,.95), rgba(10,17,46,.96));
    border:1px solid var(--border-soft);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    width:100%;
    min-width:0;
  }
  .topbar{
    padding:14px;
    display:grid;
    grid-template-columns:minmax(0,1fr) auto;
    gap:12px;
    align-items:start;
    position:sticky;
    top:calc(var(--safe-top) + 8px);
    z-index:20;
    backdrop-filter: blur(18px);
    background:
      linear-gradient(180deg, rgba(6,11,31,.92), rgba(6,11,31,.80)),
      radial-gradient(circle at 20% 30%, rgba(58,224,216,.12), transparent 24%),
      radial-gradient(circle at 78% 12%, rgba(115,82,255,.12), transparent 20%);
  }
  .brand-wrap{min-width:0;display:flex;flex-direction:column;gap:12px}
  .brand{
    font-size:24px;
    line-height:1.1;
    font-weight:800;
    letter-spacing:.1px;
    word-break:break-word;
  }
  .brand .accent{color:#9db0ff}
  .status-row,.top-right{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
  }
  .top-right{align-items:stretch; min-width:146px}
  .pill{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:46px;
    padding:10px 16px;
    border-radius:999px;
    border:1px solid var(--border);
    color:#dce5ff;
    background:rgba(95,117,255,.08);
    box-shadow:inset 0 0 0 1px rgba(140,163,255,.06);
    white-space:nowrap;
    max-width:100%;
  }
  .pill.connected{
    min-height:44px;
    padding:8px 16px;
    color:#dde7ff;
    background:rgba(121,136,255,.10);
  }
  .pill.near{
    min-height:52px;
    padding:10px 18px;
    font-size:18px;
    color:#cdd8ff;
  }
  .signout-btn{
    width:100%;
    min-height:92px;
    border:none;
    border-radius:22px;
    color:#fff;
    font-weight:800;
    background:linear-gradient(180deg, rgba(95,116,255,.16), rgba(95,116,255,.08));
    border:1px solid var(--border-soft);
    box-shadow:inset 0 0 0 1px rgba(133,154,255,.08);
  }

  .nav-grid{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:10px;
  }
  .nav-btn{
    min-width:0;
    min-height:78px;
    border:none;
    border-radius:20px;
    padding:10px 8px;
    background:linear-gradient(180deg, rgba(16,26,66,.95), rgba(10,17,46,.96));
    border:1px solid var(--border-soft);
    color:var(--text);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:4px;
    text-align:center;
    font-weight:800;
  }
  .nav-btn small{
    color:var(--muted);
    font-size:11px;
    line-height:1;
    font-weight:700;
  }
  .nav-btn.active{
    background:linear-gradient(180deg, rgba(92,108,255,.26), rgba(111,78,255,.14));
    box-shadow:inset 0 0 0 1px rgba(154,171,255,.14);
  }

  .section{
    display:none;
    gap:12px;
    flex-direction:column;
  }
  .section.active{display:flex}

  .panel{
    padding:14px;
  }
  .panel-title{
    margin:0;
    font-size:20px;
    line-height:1.1;
    font-weight:800;
  }
  .panel-sub{
    margin:6px 0 0;
    font-size:14px;
    color:var(--muted);
  }

  .stats-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:10px;
    margin-top:12px;
  }
  .stat-box{
    padding:14px;
    border-radius:20px;
    background:rgba(96,117,255,.08);
    border:1px solid rgba(100,124,255,.22);
    min-width:0;
  }
  .stat-label{
    color:var(--muted);
    font-size:13px;
    line-height:1.2;
  }
  .stat-value{
    margin-top:6px;
    font-size:28px;
    line-height:1;
    font-weight:800;
    letter-spacing:-.03em;
  }
  .metric-stack{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:12px;
  }
  .metric-bar{
    padding:12px;
    border-radius:18px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(105,127,255,.18);
  }
  .metric-top{
    display:flex;
    justify-content:space-between;
    gap:10px;
    align-items:center;
    margin-bottom:10px;
  }
  .metric-name{
    font-size:14px;
    color:var(--muted);
    font-weight:700;
  }
  .metric-value{
    font-size:21px;
    font-weight:800;
    letter-spacing:-.02em;
  }
  .track{
    height:10px;
    border-radius:999px;
    background:rgba(255,255,255,.06);
    overflow:hidden;
    border:1px solid rgba(125,145,255,.08);
  }
  .fill{
    height:100%;
    border-radius:999px;
    background:linear-gradient(90deg, rgba(53,210,181,.92), rgba(126,146,255,.92), rgba(154,108,255,.92));
  }

  .range-row,.segmented{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:12px;
  }
  .chip{
    min-height:40px;
    padding:0 14px;
    border:none;
    border-radius:999px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(111,133,255,.20);
    color:var(--muted);
    font-weight:700;
  }
  .chip.active{
    background:rgba(100,120,255,.22);
    color:var(--text);
  }

  .stack{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:12px;
  }

  .compact-item{
    background:linear-gradient(180deg, rgba(13,22,58,.92), rgba(10,17,45,.94));
    border:1px solid rgba(102,124,255,.18);
    border-radius:20px;
    overflow:hidden;
  }
  .compact-head{
    display:grid;
    grid-template-columns:minmax(0,1fr) auto;
    gap:10px;
    padding:12px;
    align-items:center;
  }
  .compact-left{
    min-width:0;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .compact-name{
    font-size:18px;
    line-height:1.15;
    font-weight:800;
    word-break:break-word;
  }
  .compact-meta{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    color:var(--muted);
    font-size:12px;
  }
  .mini-pill{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:8px 10px;
    min-height:34px;
    border-radius:999px;
    font-size:12px;
    font-weight:800;
    border:1px solid transparent;
    white-space:nowrap;
  }
  .mini-pill.ok{
    color:#b9ffe9;
    background:rgba(18,96,76,.36);
    border-color:rgba(55,209,181,.36);
  }
  .mini-pill.warn{
    color:#ffe8ba;
    background:rgba(98,74,19,.34);
    border-color:rgba(245,201,106,.28);
  }
  .mini-pill.bad{
    color:#ffd2da;
    background:rgba(106,25,46,.34);
    border-color:rgba(255,98,126,.28);
  }
  .head-actions{
    display:flex;
    gap:8px;
    align-items:center;
  }
  .icon-toggle{
    width:38px;
    height:38px;
    border-radius:12px;
    border:1px solid rgba(102,124,255,.18);
    background:rgba(255,255,255,.03);
    color:var(--text);
    flex:0 0 auto;
  }
  .renew-btn{
    min-height:40px;
    padding:0 14px;
    border:none;
    border-radius:14px;
    color:#fff;
    font-weight:800;
    background:linear-gradient(135deg, #38d6b9, #57b8ff 130%);
    box-shadow:0 10px 20px rgba(40,180,170,.22);
    flex:0 0 auto;
  }
  .ghost-btn, .danger-btn, .secondary-btn{
    min-height:42px;
    border-radius:14px;
    border:none;
    padding:0 14px;
    font-weight:800;
    color:var(--text);
  }
  .ghost-btn{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(102,124,255,.18);
  }
  .secondary-btn{
    background:linear-gradient(135deg, rgba(106,137,255,.22), rgba(141,98,255,.22));
    border:1px solid rgba(111,133,255,.22);
  }
  .danger-btn{
    background:linear-gradient(135deg, rgba(255,98,126,.18), rgba(255,98,126,.12));
    border:1px solid rgba(255,98,126,.26);
  }
  .compact-body{
    display:none;
    border-top:1px solid rgba(102,124,255,.14);
    padding:12px;
    background:rgba(255,255,255,.015);
  }
  .compact-item.open .compact-body{display:block}
  .detail-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:10px;
  }
  .detail-box{
    padding:12px;
    border-radius:16px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(102,124,255,.14);
    min-width:0;
  }
  .detail-label{
    color:var(--muted);
    font-size:12px;
    font-weight:700;
    margin-bottom:6px;
  }
  .detail-value{
    font-size:18px;
    line-height:1.2;
    font-weight:800;
    word-break:break-word;
  }
  .actions-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:12px;
  }

  .search-input, .field, .select{
    width:100%;
    min-height:48px;
    border-radius:16px;
    border:1px solid rgba(102,124,255,.20);
    background:rgba(255,255,255,.03);
    color:var(--text);
    padding:12px 14px;
    outline:none;
  }
  .field::placeholder, .search-input::placeholder{color:#7f8ec4}
  .list-empty{
    padding:18px 14px;
    color:var(--muted);
    text-align:center;
    border-radius:18px;
    border:1px dashed rgba(102,124,255,.18);
    background:rgba(255,255,255,.02);
  }
  .small-card{
    padding:14px;
    border-radius:18px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(102,124,255,.14);
  }
  .small-card h4{
    margin:0 0 6px;
    font-size:16px;
  }
  .small-card p{
    margin:0;
    font-size:13px;
    color:var(--muted);
  }
  .settings-stack{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-top:12px;
  }

  .modal{
    position:fixed;
    inset:0;
    display:none;
    align-items:flex-end;
    justify-content:center;
    background:rgba(2,5,14,.62);
    backdrop-filter:blur(10px);
    z-index:60;
    padding:14px 12px calc(var(--safe-bottom) + 12px);
  }
  .modal.show{display:flex}
  .sheet{
    width:min(100%, 480px);
    border-radius:24px;
    background:linear-gradient(180deg, rgba(15,23,58,.98), rgba(8,14,38,.98));
    border:1px solid rgba(102,124,255,.22);
    box-shadow:var(--shadow);
    padding:16px;
  }
  .sheet-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:12px;
  }
  .sheet-title{
    margin:0;
    font-size:20px;
    font-weight:800;
  }
  .close-btn{
    width:40px;
    height:40px;
    border-radius:12px;
    border:none;
    color:var(--text);
    background:rgba(255,255,255,.05);
  }
  .form-grid{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:10px;
  }
  .form-grid .full{grid-column:1 / -1}
  .field-wrap{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .field-wrap label{
    font-size:13px;
    color:var(--muted);
    font-weight:700;
  }
  .sheet-actions{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:14px;
  }
  .save-btn{
    flex:1 1 150px;
    min-height:48px;
    border:none;
    border-radius:16px;
    color:#fff;
    font-weight:800;
    background:linear-gradient(135deg, #38d6b9, #7b78ff);
  }
  .helper{
    font-size:12px;
    color:var(--muted);
  }
  .mono{
    font-family:ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  @media (max-width:360px){
    .brand{font-size:22px}
    .nav-btn{min-height:72px}
    .compact-name{font-size:16px}
    .detail-grid,.form-grid{grid-template-columns:1fr}
    .top-right{min-width:130px}
    .pill.near{font-size:16px}
  }
</style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <header class="topbar card">
        <div class="brand-wrap">
          <div class="brand">Net + Cable • <span class="accent">Admin</span></div>
          <div class="status-row">
            <div class="pill connected">Connected</div>
          </div>
        </div>
        <div class="top-right">
          <div class="pill near" id="nearExpiryPill">Near expiry: 0</div>
          <button class="signout-btn" onclick="handleSignOut()">Sign Out</button>
        </div>
      </header>

      <nav class="nav-grid">
        <button class="nav-btn active" id="tab-dashboard" onclick="setTab('dashboard')">Dashboard</button>
        <button class="nav-btn" id="tab-customers" onclick="setTab('customers')">Customers</button>
        <button class="nav-btn" id="tab-plans" onclick="setTab('plans')">Plans</button>
        <button class="nav-btn" id="sortBtn" onclick="cyclePeriod()">
          <span>Sort</span>
          <small id="sortLabel">Lifetime</small>
        </button>
        <button class="nav-btn" id="tab-reports" onclick="setTab('reports')">Reports</button>
        <button class="nav-btn" id="tab-settings" onclick="setTab('settings')">Settings</button>
      </nav>

      <section class="section active" id="section-dashboard"></section>
      <section class="section" id="section-customers"></section>
      <section class="section" id="section-plans"></section>
      <section class="section" id="section-reports"></section>
      <section class="section" id="section-settings"></section>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="sheet">
      <div class="sheet-head">
        <h3 class="sheet-title" id="modalTitle">Edit</h3>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

<script>
const STORAGE_KEY = 'net_cable_admin_phone_v4';
const LEGACY_KEYS = ['netCableCustomers', 'customers', 'netCableAdminData'];
const PLAN_LIBRARY = {
  'Smart 1 Month': { months:1, amount:30, cost:18 },
  'Smart 3 Month': { months:3, amount:80, cost:48 },
  'Smart 6 Month': { months:6, amount:150, cost:88 },
  'Smart 12 Month': { months:12, amount:280, cost:165 },
  'VIP 12 Month': { months:12, amount:460, cost:250 }
};

const state = {
  tab: 'dashboard',
  period: 'lifetime',
  expiryWindow: 30,
  loyaltySort: 'spent',
  search: '',
  customers: [],
  expanded: {
    near: {},
    expired: {},
    loyal: {},
    customers: {}
  }
};

function todayIso(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${da}`;
}
function addMonths(iso, months){
  const d = new Date(iso + 'T12:00:00');
  const originalDate = d.getDate();
  d.setMonth(d.getMonth() + Number(months || 0));
  if (d.getDate() !== originalDate) d.setDate(0);
  return d.toISOString().slice(0,10);
}
function daysLeftFrom(expiryIso){
  const now = new Date(todayIso() + 'T00:00:00');
  const end = new Date((expiryIso || todayIso()) + 'T00:00:00');
  const diff = Math.ceil((end - now) / 86400000);
  return diff;
}
function dateInPeriod(dateIso, period){
  if (!dateIso) return false;
  if (period === 'lifetime') return true;
  const d = new Date(dateIso + 'T12:00:00');
  const now = new Date();
  if (period === 'year'){
    return d.getFullYear() === now.getFullYear();
  }
  return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
}
function money(n){
  return `$${Number(n || 0).toFixed(2)}`;
}
function formatDate(iso){
  if (!iso) return '—';
  return iso;
}
function esc(str){
  return String(str ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
function inferPlanMonths(plan){
  return PLAN_LIBRARY[plan]?.months || 1;
}
function getDefaultPlan(plan){
  return PLAN_LIBRARY[plan] || PLAN_LIBRARY['Smart 1 Month'];
}
function safeArray(value){
  return Array.isArray(value) ? value : [];
}
function sum(arr, fn){
  return arr.reduce((a,b)=>a + fn(b), 0);
}
function getPayments(customer){
  return safeArray(customer.payments).map(p => ({
    date: p.date || customer.startDate || todayIso(),
    amount: Number(p.amount || 0),
    cost: Number(p.cost || 0),
    months: Number(p.months || inferPlanMonths(p.plan || customer.plan)),
    plan: p.plan || customer.plan || 'Smart 1 Month',
    type: p.type || 'new'
  }));
}
function getRenewalCount(customer){
  return getPayments(customer).filter(p => p.type === 'renewal').length;
}
function getTotalSpent(customer){
  return sum(getPayments(customer), p => Number(p.amount || 0));
}
function normalizeCustomer(raw, index = 0){
  const plan = raw.plan || raw.planName || 'Smart 1 Month';
  const startDate = raw.startDate || raw.start || raw.createdAt || todayIso();
  const expiryDate = raw.expiryDate || raw.expiry || addMonths(startDate, inferPlanMonths(plan));
  let payments = [];
  if (Array.isArray(raw.payments) && raw.payments.length){
    payments = raw.payments;
  } else if (Array.isArray(raw.renewalsLog) && raw.renewalsLog.length){
    const baseAmount = Number(raw.amount || raw.totalPaid || raw.price || getDefaultPlan(plan).amount);
    payments = [{
      date: startDate,
      amount: baseAmount,
      cost: Number(raw.cost || getDefaultPlan(plan).cost),
      months: inferPlanMonths(plan),
      plan,
      type: 'new'
    }].concat(raw.renewalsLog.map(r => ({
      date: r.date || r.startDate || todayIso(),
      amount: Number(r.amount || getDefaultPlan(r.plan || plan).amount),
      cost: Number(r.cost || getDefaultPlan(r.plan || plan).cost),
      months: Number(r.months || inferPlanMonths(r.plan || plan)),
      plan: r.plan || plan,
      type: 'renewal'
    })));
  } else {
    const baseAmount = Number(raw.totalSpent || raw.totalPaid || raw.amount || raw.price || getDefaultPlan(plan).amount);
    payments = [{
      date: startDate,
      amount: baseAmount,
      cost: Number(raw.cost || getDefaultPlan(plan).cost),
      months: inferPlanMonths(plan),
      plan,
      type: 'new'
    }];
  }

  return {
    id: raw.id || `c_${Date.now()}_${index}`,
    name: raw.name || raw.customerName || raw.fullName || 'Unnamed customer',
    phone: raw.phone || raw.mobile || raw.whatsapp || 'Not given',
    email: raw.email || '',
    plan,
    paid: raw.paid === undefined ? true : !!raw.paid,
    startDate,
    expiryDate,
    customerSince: raw.customerSince || startDate,
    payments
  };
}
function seedCustomers(){
  return [
    {

function loadCustomers(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved){
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length) return parsed.map(normalizeCustomer);
    }
    for (const key of LEGACY_KEYS){
      const legacy = localStorage.getItem(key);
      if (!legacy) continue;
      const parsed = JSON.parse(legacy);
      if (Array.isArray(parsed) && parsed.length) return parsed.map(normalizeCustomer);
      if (parsed && Array.isArray(parsed.customers) && parsed.customers.length) return parsed.customers.map(normalizeCustomer);
    }
  }catch(e){}
  return seedCustomers();
}
function saveCustomers(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state.customers));
}
function getFinancials(period = state.period){
  const payments = state.customers.flatMap(c => getPayments(c).map(p => ({...p, customerId:c.id, customerName:c.name})));
  const filtered = payments.filter(p => dateInPeriod(p.date, period));
  const turnover = sum(filtered, p => Number(p.amount || 0));
  const expense = sum(filtered, p => Number(p.cost || 0));
  const profit = turnover - expense;
  return {payments:filtered, turnover, expense, profit};
}
function getCounts(){
  const total = state.customers.length;
  const active = state.customers.filter(c => daysLeftFrom(c.expiryDate) >= 0).length;
  const near = state.customers.filter(c => {
    const d = daysLeftFrom(c.expiryDate);
    return d >= 0 && d <= state.expiryWindow;
  }).length;
  const expired = state.customers.filter(c => daysLeftFrom(c.expiryDate) < 0).length;
  return {total, active, near, expired};
}
function getNearExpiryCustomers(){
  return [...state.customers]
    .filter(c => {
      const d = daysLeftFrom(c.expiryDate);
      return d >= 0 && d <= state.expiryWindow;
    })
    .sort((a,b) => daysLeftFrom(a.expiryDate) - daysLeftFrom(b.expiryDate));
}
function getExpiredCustomers(){
  return [...state.customers]
    .filter(c => daysLeftFrom(c.expiryDate) < 0)
    .sort((a,b) => daysLeftFrom(a.expiryDate) - daysLeftFrom(b.expiryDate));
}
function getLoyalCustomers(){
  const list = [...state.customers].sort((a,b) => {
    if (state.loyaltySort === 'renewals'){
      const diff = getRenewalCount(b) - getRenewalCount(a);
      if (diff !== 0) return diff;
      return getTotalSpent(b) - getTotalSpent(a);
    }
    const diff = getTotalSpent(b) - getTotalSpent(a);
    if (diff !== 0) return diff;
    return getRenewalCount(b) - getRenewalCount(a);
  });
  return list.slice(0,20);
}
function getFilteredCustomers(){
  const q = state.search.trim().toLowerCase();
  const list = [...state.customers].sort((a,b) => a.name.localeCompare(b.name));
  if (!q) return list;
  return list.filter(c =>
    c.name.toLowerCase().includes(q) ||
    String(c.phone || '').toLowerCase().includes(q) ||
    String(c.email || '').toLowerCase().includes(q) ||
    String(c.plan || '').toLowerCase().includes(q)
  );
}
function badgeForCustomer(c){
  const d = daysLeftFrom(c.expiryDate);
  if (d < 0) return {cls:'bad', text:`Expired ${Math.abs(d)}d ago`};
  if (d <= state.expiryWindow) return {cls:'warn', text:`${d}d left`};
  return {cls:'ok', text:`Active ${d}d`};
}

}
function fillRenewDefaults(){
  const planName = document.getElementById('renewPlan')?.value;
  const plan = PLAN_LIBRARY[planName] || PLAN_LIBRARY['Smart 1 Month'];
  if (document.getElementById('renewAmount')) document.getElementById('renewAmount').value = plan.amount;
  if (document.getElementById('renewCost')) document.getElementById('renewCost').value = plan.cost;
  if (document.getElementById('renewMonths')) document.getElementById('renewMonths').value = plan.months;
}
function saveRenew(id){
  const c = getCustomerById(id);
  if (!c) return;
  const plan = document.getElementById('renewPlan').value;
  const amount = Number(document.getElementById('renewAmount').value || 0);
  const cost = Number(document.getElementById('renewCost').value || 0);
  const months = Number(document.getElementById('renewMonths').value || 1);
  const renewDate = document.getElementById('renewDate').value || todayIso();
  const paid = document.getElementById('renewPaid').value === 'true';

  c.plan = plan;
  c.startDate = renewDate;
  c.expiryDate = addMonths(renewDate, months);
  c.paid = paid;
  c.payments = getPayments(c);
  c.payments.push({
    date: renewDate,
    amount,
    cost,
    months,
    plan,
    type:'renewal'
  });

  saveCustomers();
  closeModal();
  render();
}
function openEditModal(id){
  const c = getCustomerById(id);
  if (!c) return;
  showModal('Edit Customer', `
    <div class="form-grid">
      <div class="field-wrap full">
        <label>Name</label>
        <input class="field" id="editName" value="${esc(c.name)}">
      </div>
      <div class="field-wrap">
        <label>Phone</label>
        <input class="field" id="editPhone" value="${esc(c.phone || '')}">
      </div>
      <div class="field-wrap">
        <label>Email</label>
        <input class="field" id="editEmail" value="${esc(c.email || '')}">
      </div>
      <div class="field-wrap full">
        <label>Plan</label>
        <select class="select" id="editPlan">
          ${Object.keys(PLAN_LIBRARY).map(name => `<option value="${esc(name)}" ${name===c.plan?'selected':''}>${esc(name)}</option>`).join('')}
        </select>
      </div>
      <div class="field-wrap">
        <label>Start</label>
        <input class="field" id="editStart" type="date" value="${esc(c.startDate)}">
      </div>
      <div class="field-wrap">
        <label>Expiry</label>
        <input class="field" id="editExpiry" type="date" value="${esc(c.expiryDate)}">
      </div>
      <div class="field-wrap full">
        <label>Paid</label>
        <select class="select" id="editPaid">
          <option value="true" ${c.paid?'selected':''}>Paid</option>
          <option value="false" ${!c.paid?'selected':''}>Unpaid</option>
        </select>
      </div>
      <div class="field-wrap full">
        <label>Important</label>
        <div class="helper">Editing this customer will not change renewal count or total paid history.</div>
      </div>
    </div>
    <div class="sheet-actions">
      <button class="save-btn" onclick="saveEdit('${c.id}')">Save Changes</button>
      <button class="ghost-btn" onclick="closeModal()">Cancel</button>
    </div>
  `);
}
function saveEdit(id){
  const c = getCustomerById(id);
  if (!c) return;
  c.name = document.getElementById('editName').value.trim() || 'Unnamed customer';
  c.phone = document.getElementById('editPhone').value.trim() || 'Not given';
  c.email = document.getElementById('editEmail').value.trim();
  c.plan = document.getElementById('editPlan').value;
  c.startDate = document.getElementById('editStart').value || c.startDate;
  c.expiryDate = document.getElementById('editExpiry').value || c.expiryDate;
  c.paid = document.getElementById('editPaid').value === 'true';

  saveCustomers();
  closeModal();
  render();
}
function openSlipModal(id){
  const c = getCustomerById(id);
  if (!c) return;
  const payments = getPayments(c);
  const last = payments[payments.length - 1];
  const text = [
    'NET + CABLE',
    `Customer: ${c.name}`,
    `Phone: ${c.phone || 'Not given'}`,
    `Plan: ${c.plan}`,
    `Paid: ${c.paid ? 'Paid' : 'Unpaid'}`,
    `Start: ${c.startDate}`,
    `Expiry: ${c.expiryDate}`,
    `Last Amount: ${money(last?.amount || 0)}`,
    `Renewals: ${getRenewalCount(c)}`
  ].join('\n');

  showModal('Payment Slip', `
    <div class="small-card">
      <h4>${esc(c.name)}</h4>
      <p class="mono" style="white-space:pre-wrap">${esc(text)}</p>
    </div>
    <div class="sheet-actions">
      <button class="save-btn" onclick="copySlip()">Copy Slip</button>
      <button class="ghost-btn" onclick="closeModal()">Close</button>
    </div>
  `);
  window.__slipText = text;
}
async function copySlip(){
  try{
    await navigator.clipboard.writeText(window.__slipText || '');
    alert('Slip copied');
  }catch(e){
    alert('Could not copy on this device');
  }
}
function deleteCustomer(id){
  const c = getCustomerById(id);
  if (!c) return;
  if (!confirm(`Delete ${c.name}?`)) return;
  state.customers = state.customers.filter(item => item.id !== id);
  saveCustomers();
  closeModal();
  render();
}
function exportData(){
  const blob = new Blob([JSON.stringify(state.customers, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'net-cable-customers.json';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    URL.revokeObjectURL(a.href);
    a.remove();
  }, 1000);
}
function importPrompt(){
  const pasted = prompt('Paste customer JSON here');
  if (!pasted) return;
  try{
    const parsed = JSON.parse(pasted);
    if (Array.isArray(parsed)){
      state.customers = parsed.map(normalizeCustomer);
    } else if (Array.isArray(parsed.customers)){
      state.customers = parsed.customers.map(normalizeCustomer);
    } else {
      throw new Error('Invalid');
    }
    saveCustomers();
    render();
    alert('Imported');
  }catch(e){
    alert('Invalid JSON');
  }
}
function resetDemo(){
  if (!confirm('Reset and load demo customers?')) return;
  state.customers = seedCustomers();
  saveCustomers();
  render();
}
function handleSignOut(){
  localStorage.removeItem('netCableAdminSession');
  localStorage.removeItem('adminLoggedIn');
  alert('Signed out');
}
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') closeModal();
});

state.customers = loadCustomers();
render();
</script>
</body>
</html>
